name: Build Unsigned IPA

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ipa:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup XcodeGen
        run: |
          brew install xcodegen

      - name: Install dependencies
        run: |
          pwd
          ls -la
          xcodegen --spec project.yml
          ls -la

      - name: Build unsigned app bundle
        run: |
          set -o pipefail
          xcodebuild clean build \
            -project ProjectMGSS.xcodeproj \
            -scheme ProjectMGSS \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee build.log

          APP_PATH=$(find build/Build/Products/Release-iphoneos -maxdepth 1 -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found" | tee -a build.log
            exit 1
          fi

          mkdir -p artifacts/Payload
          cp -R "$APP_PATH" artifacts/Payload/
          (cd artifacts && zip -qry ProjectMGSS-unsigned.ipa Payload)
          rm -rf artifacts/Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProjectMGSS
          path: artifacts/*.ipa
          retention-days: 30

      - name: Sync IPA to GitHub Release
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ci-main-latest
          RELEASE_NAME: CI Main Latest IPA
          IPA_PATH: ${{ github.workspace }}/artifacts/ProjectMGSS-unsigned.ipa
        run: |
          set -euo pipefail
          if [ ! -f "$IPA_PATH" ]; then
            echo 'No IPA found for release sync'
            exit 1
          fi
          python3 scripts/sync_release.py

      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
