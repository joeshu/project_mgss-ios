name: Build Unsigned IPA

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build-ipa:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup XcodeGen
        run: |
          brew install xcodegen

      - name: Install dependencies
        run: |
          pwd
          ls -la
          xcodegen --spec project.yml
          ls -la

      - name: Build unsigned app bundle
        run: |
          set -o pipefail
          xcodebuild clean build \
            -project ProjectMGSS.xcodeproj \
            -scheme ProjectMGSS \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee build.log

          APP_PATH=$(find build/Build/Products/Release-iphoneos -maxdepth 1 -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found" | tee -a build.log
            exit 1
          fi

          mkdir -p artifacts/Payload
          cp -R "$APP_PATH" artifacts/Payload/
          (cd artifacts && zip -qry ProjectMGSS-unsigned.ipa Payload)
          rm -rf artifacts/Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProjectMGSS
          path: artifacts/*.ipa
          retention-days: 30

      - name: Sync IPA to GitHub Release
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ci-main-latest
          RELEASE_NAME: CI Main Latest IPA
          IPA_PATH: ${{ github.workspace }}/artifacts/ProjectMGSS-unsigned.ipa
        run: |
          set -euo pipefail
          if [ ! -f "$IPA_PATH" ]; then
            echo 'No IPA found for release sync'
            exit 1
          fi
          cat > sync_release.py <<'PY'
          import json
          import os
          import pathlib
          import subprocess
          import urllib.parse

          repo = os.environ['GITHUB_REPOSITORY']
          token = os.environ['GITHUB_TOKEN']
          tag = os.environ.get('TAG_NAME', 'ci-main-latest')
          name = os.environ.get('RELEASE_NAME', tag)
          ipa = pathlib.Path(os.environ['IPA_PATH'])
          body = (
              'Auto-synced unsigned IPA from main branch CI.\n\n'
              f'- workflow: {os.environ.get("GITHUB_WORKFLOW", "")}\n'
              f'- run: https://github.com/{repo}/actions/runs/{os.environ.get("GITHUB_RUN_ID", "")}\n'
              f'- commit: {os.environ.get("GITHUB_SHA", "")}\n'
          )

          def curl_json(method, url, data=None, extra_headers=None, binary_file=None):
              cmd = [
                  'curl', '-fsS', '-X', method,
                  '-H', 'Accept: application/vnd.github+json',
                  '-H', 'X-GitHub-Api-Version: 2022-11-28',
                  '-H', f'Authorization: Bearer {token}',
              ]
              if extra_headers:
                  for h in extra_headers:
                      cmd += ['-H', h]
              if binary_file:
                  cmd += ['--data-binary', '@' + binary_file]
              elif data is not None:
                  cmd += ['--data-binary', json.dumps(data)]
              cmd.append(url)
              p = subprocess.run(cmd, stdout=subprocess.PIPE, stderr=subprocess.PIPE, text=True)
              if p.returncode:
                  raise RuntimeError((p.stderr or p.stdout).strip())
              return json.loads(p.stdout or '{}')

          base = f'https://api.github.com/repos/{repo}'
          check = subprocess.run([
              'curl', '-sS', '-o', '/tmp/release_check.json', '-w', '%{http_code}',
              '-H', 'Accept: application/vnd.github+json',
              '-H', f'Authorization: Bearer {token}',
              f'{base}/releases/tags/{tag}'
          ], stdout=subprocess.PIPE, stderr=subprocess.PIPE, text=True)
          if check.returncode:
              raise RuntimeError((check.stderr or check.stdout).strip())
          status = check.stdout.strip()
          release_payload = {
              'tag_name': tag,
              'target_commitish': 'main',
              'name': name,
              'body': body,
              'draft': False,
              'prerelease': False,
              'generate_release_notes': False,
          }
          if status == '200':
              existing = json.loads(pathlib.Path('/tmp/release_check.json').read_text() or '{}')
              release_id = existing['id']
              release = curl_json('PATCH', f'{base}/releases/{release_id}', data=release_payload)
          else:
              release = curl_json('POST', f'{base}/releases', data=release_payload)

          release_id = release['id']
          asset_name = ipa.name
          for asset in release.get('assets', []):
              if asset.get('name') == asset_name:
                  subprocess.run([
                      'curl', '-fsS', '-X', 'DELETE',
                      '-H', f'Authorization: Bearer {token}',
                      '-H', 'Accept: application/vnd.github+json',
                      f'{base}/releases/assets/{asset["id"]}'
                  ], check=True)

          upload_url = (
              f'https://uploads.github.com/repos/{repo}/releases/{release_id}/assets'
              f'?name={urllib.parse.quote(asset_name)}'
          )
          asset = curl_json(
              'POST',
              upload_url,
              extra_headers=['Content-Type: application/octet-stream'],
              binary_file=str(ipa),
          )
          print(json.dumps({
              'release_url': release.get('html_url'),
              'asset_url': asset.get('browser_download_url')
          }, ensure_ascii=False))
          PY
          python3 sync_release.py
          rm -f sync_release.py

      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
