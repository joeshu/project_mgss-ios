name: ProjectMGSS
options:
  bundleIdPrefix: com.xiaopan
  deploymentTarget:
    iOS: "16.0"
  developmentLanguage: zh-Hans

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.xiaopan.projectmgss
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1

targets:
  ProjectMGSS:
    type: application
    platform: iOS
    sources:
      - Sources
    resources:
      - Resources
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: 夜半宿舍防线
        CFBundleShortVersionString: 1.0.0
        CFBundleVersion: 1
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
